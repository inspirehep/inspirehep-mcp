name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        run: docker build --target test -t inspirehep-mcp-tests .

      - name: Run tests
        run: docker run --entrypoint poetry inspirehep-mcp-tests run pytest
